name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK r27b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Generate Gradle wrapper (using 8.10)
      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.10

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # Auto-create GitHub Release
      - name: Auto Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --title "Build $TAG_NAME" \
            --generate-notes \
            --latest \
            --force
