name: Build and Release Nexus VPN

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: Nexus VPN v2.0.0 Build ${{ github.run_number }}
          body: |
            ## Nexus VPN v2.0.0 - Real VPN Implementation
            
            ### Features
            - ✅ Real Tor Integration (Tor Android Library)
            - ✅ SNI Spoofing (TLS Client Hello Modification)
            - ✅ VPN Mode (No Root Required)
            - ✅ DNS Leak Protection
            - ✅ Kill Switch
            - ✅ Bridge Support (obfs4, webtunnel)
            
            ### Installation
            1. Download app-debug.apk
            2. Install on Android device
            3. Grant VPN permission
            4. Connect!
            
            ### Inspired by Invizible Pro
            Built with proven libraries, not stubs.
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk            android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
