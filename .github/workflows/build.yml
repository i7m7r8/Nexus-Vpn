name: Build & Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"
  NDK_VERSION: "r27b"
  TOR_VERSION: "14.0.5"

jobs:
  # Build job for all variants
  build:
    name: Build Nexus VPN
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Download Tor Expert Bundles for Android from official Tor Project
      - name: Download Tor Expert Bundles
        run: |
          mkdir -p android/app/src/main/assets/tor

          echo "Downloading Tor Expert Bundle for arm64-v8a..."
          curl -fSL "https://dist.torproject.org/torbrowser/15.0.8/tor-expert-bundle-android-aarch64-15.0.8.tar.gz" -o /tmp/tor-arm64.tar.gz
          mkdir -p /tmp/tor-arm64 && tar xzf /tmp/tor-arm64.tar.gz -C /tmp/tor-arm64
          find /tmp/tor-arm64 -name "tor" -type f -exec cp {} android/app/src/main/assets/tor/tor-arm64 \;
          chmod +x android/app/src/main/assets/tor/tor-arm64

          echo "Downloading Tor Expert Bundle for x86_64..."
          curl -fSL "https://dist.torproject.org/torbrowser/15.0.8/tor-expert-bundle-android-x86_64-15.0.8.tar.gz" -o /tmp/tor-x86_64.tar.gz
          mkdir -p /tmp/tor-x86_64 && tar xzf /tmp/tor-x86_64.tar.gz -C /tmp/tor-x86_64
          find /tmp/tor-x86_64 -name "tor" -type f -exec cp {} android/app/src/main/assets/tor/tor-x86_64 \;
          chmod +x android/app/src/main/assets/tor/tor-x86_64

          echo "Copying geoip files..."
          find /tmp/tor-arm64 /tmp/tor-x86_64 -name "geoip" -type f -exec cp {} android/app/src/main/assets/tor/ \; 2>/dev/null || true
          find /tmp/tor-arm64 /tmp/tor-x86_64 -name "geoip6" -type f -exec cp {} android/app/src/main/assets/tor/ \; 2>/dev/null || true

          echo "=== Tor binaries ==="
          ls -lh android/app/src/main/assets/tor/ || echo "No Tor binaries found"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -fSL "https://services.gradle.org/distributions/gradle-8.10-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE_HOME=/tmp/gradle-8.10
          $GRADLE_HOME/bin/gradle wrapper --gradle-version 8.10
          rm -rf /tmp/gradle.zip /tmp/gradle-8.10

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # Debug: List built APKs and check native libraries
      - name: Check APK contents
        if: always()
        run: |
          echo "=== Built APKs ==="
          find android/app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || echo "No APKs found!"

          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            echo "=== Native libs in APK ==="
            unzip -l "$APK" | grep -E "\.so$" || echo "No .so files!"
            echo "=== Tor assets ==="
            unzip -l "$APK" | grep -i "tor" || echo "No tor files in assets!"
          fi

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
          overwrite: true

  # Release job (only on push to main)
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nexus-vpn-apks
          path: release-apks

      - name: List downloaded APKs
        run: |
          echo "=== Downloaded APKs ==="
          ls -lh release-apks/
          APK_COUNT=$(find release-apks -name "*.apk" | wc -l)
          echo "Found $APK_COUNT APK(s)"

      - name: Generate Release Tag
        id: tag
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

      - name: Generate Release Notes
        run: |
          echo "## Changes in this build" > release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s (%h)" -20 >> release_notes.md
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## APK Variants" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **app-debug.apk** - Debug build for testing" >> release_notes.md
          echo "- **app-release-unsigned.apk** - Release build (unsigned)" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Nexus VPN ${{ steps.tag.outputs.tag_name }}"
          body_path: release_notes.md
          files: release-apks/*.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release created: ${{ steps.tag.outputs.tag_name }}"
          echo "📦 APKs uploaded to release"
