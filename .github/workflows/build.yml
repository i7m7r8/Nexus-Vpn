name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: "25.2.9519653"
  RUST_VERSION: "1.75.0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      # ─── Build Rust core for both ABIs ─
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: cargo ndk -t aarch64-linux-android -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust (x86_64)
        working-directory: rust-core
        run: cargo ndk -t x86_64-linux-android -o ../android/app/src/main/jniLibs build --release

      - name: Build debug APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── Upload debug APK as artifact ─
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      # ─── Create release automatically ─
      - name: Auto Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --title "Auto-build $TAG_NAME" \
            --generate-notes \
            --latest
