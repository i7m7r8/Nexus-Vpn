name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"
  TOR_VERSION: "15.0.8"

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK r27b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Download Tor Expert Bundles from official Tor Project (for geoip data)
      - name: Download Tor Expert Bundle (arm64-v8a)
        run: |
          mkdir -p /tmp/tor-arm64 android/app/src/main/assets/tor
          curl -fSL "https://dist.torproject.org/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-aarch64-${{ env.TOR_VERSION }}.tar.gz" \
            -o /tmp/tor-arm64.tar.gz
          tar xzf /tmp/tor-arm64.tar.gz -C /tmp/tor-arm64
          # Copy geoip files to assets
          find /tmp/tor-arm64 -name "geoip*" -exec cp {} android/app/src/main/assets/tor/ \;
          echo "=== GeoIP files ==="
          ls -la android/app/src/main/assets/tor/

      - name: Download Tor Expert Bundle (x86_64)
        run: |
          mkdir -p /tmp/tor-x86_64 android/app/src/main/assets/tor
          curl -fSL "https://dist.torproject.org/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-x86_64-${{ env.TOR_VERSION }}.tar.gz" \
            -o /tmp/tor-x86_64.tar.gz
          tar xzf /tmp/tor-x86_64.tar.gz -C /tmp/tor-x86_64
          # Copy geoip files to assets
          find /tmp/tor-x86_64 -name "geoip*" -exec cp {} android/app/src/main/assets/tor/ \;

      # Download guardianproject tor-android libtor.so (executable from lib/ dir)
      - name: Download libtor.so (arm64-v8a)
        run: |
          mkdir -p /tmp/tor-aar
          curl -fSL "https://raw.githubusercontent.com/guardianproject/gpmaven/master/info/guardianproject/tor-android/0.4.8.16/tor-android-0.4.8.16.aar" \
            -o /tmp/tor-aar/tor.aar
          cd /tmp/tor-aar && unzip -o tor.aar
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp jni/arm64-v8a/libtor.so android/app/src/main/jniLibs/arm64-v8a/
          echo "=== libtor.so arm64 ==="
          ls -la android/app/src/main/jniLibs/arm64-v8a/

      - name: Download libtor.so (x86_64)
        run: |
          mkdir -p /tmp/tor-aar
          curl -fSL "https://raw.githubusercontent.com/guardianproject/gpmaven/master/info/guardianproject/tor-android/0.4.8.16/tor-android-0.4.8.16.aar" \
            -o /tmp/tor-aar/tor.aar
          cd /tmp/tor-aar && unzip -o tor.aar
          mkdir -p android/app/src/main/jniLibs/x86_64
          cp jni/x86_64/libtor.so android/app/src/main/jniLibs/x86_64/
          echo "=== libtor.so x86_64 ==="
          ls -la android/app/src/main/jniLibs/x86_64/

      # Generate Gradle wrapper (using 8.10)
      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.10

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # Auto-create GitHub Release
      - name: Auto Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --title "Build $TAG_NAME" \
            --generate-notes \
            --latest || true
