name: Build and Release Nexus VPN

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Build Rust Library for Android
  # ════════════════════════════════════════════════════════════
  build-rust:
    name: Build Rust Core for Android
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Build Rust for Android (ARM64)
        run: |
          cd rust
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Rust for Android (ARMv7)
        run: |          cd rust
          cargo ndk -t armeabi-v7a -o ../android/app/src/main/jniLibs build --release
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Rust for Android (x86_64)
        run: |
          cd rust
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Rust for Android (x86)
        run: |
          cd rust
          cargo ndk -t x86 -o ../android/app/src/main/jniLibs build --release
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify .so files
        run: |
          echo "=== Android .so files ==="
          find android/app/src/main/jniLibs -name "*.so"
          ls -la android/app/src/main/jniLibs/*/

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-libs
          path: android/app/src/main/jniLibs/

  # ════════════════════════════════════════════════════════════
  # JOB 2: Build Android APK
  # ════════════════════════════════════════════════════════════
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-rust
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-libs
          path: android/app/src/main/jniLibs/

      - name: Verify .so files        run: |
          echo "=== Downloaded .so files ==="
          find android/app/src/main/jniLibs -name "*.so"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Nexus VPN v1.0.0 Build ${{ github.run_number }}
          body: |
            ## Changes
            - Rust Core (ARM64, ARMv7, x86_64, x86)
            - Android UI (Jetpack Compose)
            - SNI → Tor Chain Implementation
            
            ## Installation            1. Download app-debug.apk for testing
            2. Install on Android device
            3. Grant VPN permission
            4. Connect!
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # JOB 3: Summary
  # ════════════════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-rust, build-android]
    
    steps:
      - name: Build Complete
        run: |
          echo "✅ BUILD COMPLETE!"
          echo ""
          echo "📦 Rust Library: arm64-v8a, armeabi-v7a, x86_64, x86"
          echo "📱 Android APK: Debug + Release"
          echo ""
          echo "🔗 Download from: https://github.com/${{ github.repository }}/releases"
