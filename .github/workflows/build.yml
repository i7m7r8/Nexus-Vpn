name: Build & Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"
  NDK_VERSION: "r27b"

jobs:
  build:
    name: Build Nexus VPN
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Download tor-android AAR and extract libtor.so
      - name: Get Tor Binary
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          curl -fSL "https://raw.githubusercontent.com/guardianproject/gpmaven/master/info/guardianproject/tor-android/0.4.8.17.2/tor-android-0.4.8.17.2.aar" -o /tmp/tor.aar
          unzip -p /tmp/tor.aar jni/arm64-v8a/libtor.so > android/app/src/main/jniLibs/arm64-v8a/libtor.so
          ls -lh android/app/src/main/jniLibs/arm64-v8a/libtor.so
          rm -f /tmp/tor.aar

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -fSL "https://services.gradle.org/distributions/gradle-8.10-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.10/bin/gradle wrapper --gradle-version 8.10
          rm -rf /tmp/gradle.zip /tmp/gradle-8.10

      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Check APK contents
        if: always()
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            echo "=== .so files ==="
            unzip -l "$APK" | grep "\.so$" || echo "none"
            echo "=== Tor asset ==="
            unzip -l "$APK" | grep "assets/tor" || echo "none"
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
          overwrite: true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nexus-vpn-apks
          path: release-apks

      - name: List APKs
        run: ls -lh release-apks/

      - name: Generate Release Tag
        id: tag
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: |
          echo "## Changes" > release_notes.md
          git log --pretty=format:"- %s (%h)" -20 >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Nexus VPN ${{ steps.tag.outputs.tag_name }}"
          body_path: release_notes.md
          files: release-apks/*.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
