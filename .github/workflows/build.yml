name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: "27.2.12479018"
  RUST_VERSION: "stable"

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cargo build --release --target aarch64-linux-android
          cp target/aarch64-linux-android/release/libnexus_vpn.so \
             ../android/app/src/main/jniLibs/arm64-v8a/

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          mkdir -p ../android/app/src/main/jniLibs/x86_64
          cargo build --release --target x86_64-linux-android
          cp target/x86_64-linux-android/release/libnexus_vpn.so \
             ../android/app/src/main/jniLibs/x86_64/

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # Auto-create GitHub Release
      - name: Auto Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Build $TAG_NAME" \
            --generate-notes \
            --latest
