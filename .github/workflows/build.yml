name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK 27
        shell: bash
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r27c-linux.zip"
          echo "⬇️ Downloading NDK..."
          curl -L "$NDK_URL" -o /tmp/ndk.zip
          echo "📦 Extracting..."
          unzip -q /tmp/ndk.zip -d /opt/android/ndk
          ANDROID_NDK_HOME="/opt/android/android-ndk-r27c"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "android_ndk_version=r27c" >> $GITHUB_ENV
          echo "📍 NDK installed at $ANDROID_NDK_HOME"
          ls "$ANDROID_NDK_HOME"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cargo ndk -t arm64-v8a build --release
          cp target/aarch64-linux-android/release/libnexus_vpn.so \
             ../android/app/src/main/jniLibs/arm64-v8a/

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          mkdir -p ../android/app/src/main/jniLibs/x86_64
          cargo ndk -t x86_64 build --release
          cp target/x86_64-linux-android/release/libnexus_vpn.so \
             ../android/app/src/main/jniLibs/x86_64/

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # Auto-create GitHub Release
      - name: Auto Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --title "Build $TAG_NAME" \
            --generate-notes \
            --latest
