name: Build & Release APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"
  NDK_VERSION: "r27b"

jobs:
  # Build job for all variants
  build:
    name: Build Nexus VPN
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          # Download and extract Gradle 8.10 to get wrapper files
          curl -fSL "https://services.gradle.org/distributions/gradle-8.10-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE_HOME=/tmp/gradle-8.10

          # Generate wrapper using the downloaded Gradle
          $GRADLE_HOME/bin/gradle wrapper --gradle-version 8.10

          # Clean up
          rm -rf /tmp/gradle.zip /tmp/gradle-8.10

      # Build Rust lib for both architectures
      - name: Build Rust lib (arm64-v8a)
        working-directory: rust-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Build Rust lib (x86_64)
        working-directory: rust-core
        run: |
          cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

      # Build Android APKs
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # Debug: List built APKs
      - name: List built APKs
        if: always()
        run: |
          echo "=== Built APKs ==="
          find android/app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || echo "No APKs found!"

      # Debug: Check native libraries in APK
      - name: Check native libraries in APK
        if: always()
        run: |
          echo "=== Checking APK for native libraries ==="
          APK_FILE=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -f "$APK_FILE" ]; then
            echo "APK: $APK_FILE"
            unzip -l "$APK_FILE" | grep -E "\.(so|aar)" || echo "No .so files found in APK!"
            echo "---"
            unzip -l "$APK_FILE" | grep -i "libtor" || echo "No libtor found!"
            echo "---"
            unzip -l "$APK_FILE" | grep -i "libnexus" || echo "No libnexus_vpn found!"
          else
            echo "No debug APK found"
          fi

      # Upload APKs as artifacts
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-apks
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

  # Release job (only on push to main)
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nexus-vpn-apks
          path: release-apks

      - name: List downloaded APKs
        run: |
          echo "=== Downloaded APKs ==="
          ls -lh release-apks/ || echo "No APKs downloaded!"

      - name: Generate Release Tag
        id: tag
        run: |
          TAG_NAME="v$(date +%Y%m%d.%H%M%S)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

      - name: Generate Release Notes
        run: |
          echo "## Changes in this build" > release_notes.md
          echo "" >> release_notes.md

          # Get recent commits
          git log --pretty=format:"- %s (%h)" -20 >> release_notes.md

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## APK Variants" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **app-debug.apk** - Debug build for testing" >> release_notes.md
          echo "- **app-release-unsigned.apk** - Release build (unsigned)" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Nexus VPN ${{ steps.tag.outputs.tag_name }}"
          body_path: release_notes.md
          files: |
            release-apks/app-debug.apk
            release-apks/app-release-unsigned.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release created: ${{ steps.tag.outputs.tag_name }}"
          echo "📦 APKs uploaded to release"
