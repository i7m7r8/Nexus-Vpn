# ============================================================================
# NEXUS VPN - Android Build & Release (SNI → Tor Chain)
# Builds Rust Core + Android APK on GitHub Actions
# ============================================================================

name: Build & Release Nexus VPN

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: 1.83.0
  NDK_VERSION: "27.0.12077973"
  ANDROID_SDK_VERSION: 35

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install Android NDK Targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Core (ARM64 + X86_64)
        run: |
          cd rust/core
          cargo build --release --target aarch64-linux-android
          cargo build --release --target x86_64-linux-android
          
          echo "✅ Rust libraries built!"
          ls -la ../target/*/release/libnexus_vpn_core.so 2>/dev/null || echo "Checking target dir..."
          find ../target -name "libnexus_vpn_core.so" 2>/dev/null

      - name: Copy Rust Libraries to Android
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/x86_64
          
          # Find and copy the libraries
          find rust/target -name "libnexus_vpn_core.so" -exec echo "Found: {}" \;
          
          cp rust/target/aarch64-linux-android/release/libnexus_vpn_core.so \
             android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || \
          find rust/target -path "*/aarch64-linux-android/release/libnexus_vpn_core.so" -exec cp {} android/app/src/main/jniLibs/arm64-v8a/ \;
          
          cp rust/target/x86_64-linux-android/release/libnexus_vpn_core.so \
             android/app/src/main/jniLibs/x86_64/ 2>/dev/null || \
          find rust/target -path "*/x86_64-linux-android/release/libnexus_vpn_core.so" -exec cp {} android/app/src/main/jniLibs/x86_64/ \;
          
          echo "✅ Rust libraries copied to Android project!"
          ls -la android/app/src/main/jniLibs/*/ 2>/dev/null || echo "jniLibs not created yet"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Make Gradle Executable
        run: |
          cd android
          chmod +x gradlew || echo "gradlew not found, will use gradle wrapper"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace || gradle assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          cd android          ./gradlew assembleRelease --stacktrace || gradle assembleRelease --stacktrace

      - name: List Generated APKs
        run: |
          echo "=== Generated APKs ==="
          find android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null -exec ls -lh {} \; || echo "No APKs found"

      - name: Upload Debug APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Release APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: Nexus VPN v1.0.0 - SNI → Tor Chain
          body: |
            ## 🎉 Nexus VPN v1.0.0
            
            ### 🔐 Masterplan Core Feature: SNI → Tor Chain
            
            **Connection Flow:**
            1. Device → SNI Handler (TLS Client Hello spoofing)
            2. SNI → Tor Network (Arti client, 3-hop circuit)
            3. Tor → Internet (Anonymous multi-hop routing)
            
            ### 📱 Features
            - ✅ SNI Obfuscation (DPI bypass)
            - ✅ Tor Integration (Arti v0.40)
            - ✅ SNI → Tor Chain (Maximum anonymity)
            - ✅ Kill Switch (Leak protection)
            - ✅ IPv6 Blocking
            - ✅ DNS over HTTPS
            - ✅ Material 3 UI
            - ✅ Real-time Statistics
            
            ### 🔧 Technical Specs            - **Rust Core:** nexus-vpn-core
            - **Android:** Kotlin + Jetpack Compose
            - **JNI Bridge:** Rust ↔ Kotlin
            - **Architectures:** ARM64 + X86_64
            - **Min SDK:** 24 (Android 7.0)
            - **Target SDK:** 35 (Android 15)
            
            ### 📥 Downloads
            - `*-release.apk` - Production build (optimized)
            - `*-debug.apk` - Debug build (logging enabled)
            
            ### ⚠️ Important Note
            This is a **prototype** implementation. Use at your own risk.
          files: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
