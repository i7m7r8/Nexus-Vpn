name: Build and Release Nexus VPN

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android,x86_64-linux-android

    - name: Setup Android Environment
      uses: android-actions/setup-android@v3

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build with cargo-ndk
      run: cd rust/core && cargo ndk -t arm64-v8a -t x86_64 -o ../target/jniLibs build --release

    - name: Copy Libraries
      run: mkdir -p android/app/src/main/jniLibs && cp -r rust/target/jniLibs/* android/app/src/main/jniLibs/

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.4.1'

    - name: Build APK
      run: cd android && chmod +x gradlew && ./gradlew assembleDebug assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: nexus-vpn-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: ignore

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: nexus-vpn-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: ignore

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: Nexus VPN v1.0.0
        body: Nexus VPN with SNI to Tor Chain
        files: android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
