name: Build & Release Nexus VPN

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - run: cargo install cargo-ndk

      - name: Build Rust
        run: |
          cargo ndk -t arm64-v8a -t x86_64 \
            -o android/app/src/main/jniLibs build --release

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.4.1

      - name: Build APK (unsigned)
        run: |
          cd android
          gradle assembleRelease

      - name: Sign APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore ../../../../../keystore.jks \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              "$apk" "$KEY_ALIAS"
          done
          cd ../../../../..
          rm keystore.jks

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          body: |
            ## Nexus VPN v${{ github.run_number }}

            Automated release build with latest dependencies
            - JDK 25
            - Gradle 9.4.1
            - Android Gradle Plugin 9.5.0
            - Rust: tokio 1.44, rustls 0.23, ndk 0.8
            - Signed APK included
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
