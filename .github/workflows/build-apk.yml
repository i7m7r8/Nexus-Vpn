# ============================================================================
# NEXUS VPN - Android Build & Release (SNI → Tor Chain)
# LATEST VERSIONS - Rust + Android APK on GitHub Actions
# ============================================================================

name: Build & Release Nexus VPN

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: stable
  NDK_VERSION: r27
  ANDROID_SDK_VERSION: 35

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain (Latest Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install Android NDK Targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Show Rust Version
        run: |
          rustc --version
          cargo --version

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Setup Java JDK 25 (Latest)        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Install cargo-ndk (Latest)
        run: cargo install cargo-ndk

      - name: Build Rust Core (ARM64 + X86_64)
        run: |
          cd rust/core
          cargo build --release --target aarch64-linux-android
          cargo build --release --target x86_64-linux-android
          
          echo "✅ Rust libraries built!"
          find ../target -name "libnexus_vpn_core.so" 2>/dev/null

      - name: Copy Rust Libraries to Android
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/x86_64
          
          # Copy ARM64 library
          cp rust/target/aarch64-linux-android/release/libnexus_vpn_core.so \
             android/app/src/main/jniLibs/arm64-v8a/ || \
          find rust/target -name "libnexus_vpn_core.so" -path "*aarch64*" | head -1 | xargs -I {} cp {} android/app/src/main/jniLibs/arm64-v8a/
          
          # Copy X86_64 library
          cp rust/target/x86_64-linux-android/release/libnexus_vpn_core.so \
             android/app/src/main/jniLibs/x86_64/ || \
          find rust/target -name "libnexus_vpn_core.so" -path "*x86_64*" | head -1 | xargs -I {} cp {} android/app/src/main/jniLibs/x86_64/
          
          echo "✅ Rust libraries copied!"
          ls -la android/app/src/main/jniLibs/*/ 2>/dev/null || echo "jniLibs structure:"
          find android/app/src/main/jniLibs -type f 2>/dev/null

      - name: Setup Gradle (Latest 9.4.1)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Make Gradle Executable
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || echo "gradlew not found"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1 || gradle assembleDebug --stacktrace 2>&1
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace 2>&1 || gradle assembleRelease --stacktrace 2>&1

      - name: List Generated APKs
        run: |
          echo "=== Generated APKs ==="
          find android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null -exec ls -lh {} \; || echo "No APKs found"

      - name: Upload Debug APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Release APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: Nexus VPN v1.0.0 - SNI → Tor Chain (Latest Build)
          body: |
            ## 🎉 Nexus VPN v1.0.0 - LATEST VERSIONS
            
            ### 🔐 Masterplan Core Feature: SNI → Tor Chain
            
            **Connection Flow:**
            1. Device → SNI Handler (TLS Client Hello spoofing)
            2. SNI → Tor Network (Arti client, 3-hop circuit)
            3. Tor → Internet (Anonymous multi-hop routing)
            
            ### 📱 Features
            - ✅ SNI Obfuscation (DPI bypass)
            - ✅ Tor Integration (Arti v0.40)
            - ✅ SNI → Tor Chain (Maximum anonymity)
            - ✅ Kill Switch (Leak protection)
            - ✅ IPv6 Blocking
            - ✅ DNS over HTTPS            - ✅ Material 3 UI
            - ✅ Real-time Statistics
            
            ### 🔧 Latest Versions
            - **Rust:** Latest Stable
            - **JDK:** 25
            - **Gradle:** 9.4.1
            - **AGP:** 9.0.0
            - **Kotlin:** 2.1.0+
            - **NDK:** r27
            - **cargo-ndk:** Latest
            
            ### 📥 Downloads
            - `*-release.apk` - Production build
            - `*-debug.apk` - Debug build
          files: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
